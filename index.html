<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%234299e1'/%3E%3Cstop offset='100%25' style='stop-color:%23805ad5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-family='Arial,sans-serif' font-size='55' font-weight='bold' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Aniocean· Stream Anime, Movies & TV-Show</title>
  <meta name="description" content="Watch the latest anime, movies, and TV series for free on Aniocean. Discover new releases effortlessly with real-time search and multi-language subs.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400..700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg-body: #0a1929;
      --bg-header: #0f2440;
      --bg-card: #132f4c;
      --bg-surface: #1a3a5c;
      --bg-popup: #102a44;
      --text-primary: #ffffff;
      --text-secondary: #b0c7e3;
      --text-muted: #94a3b8;
      --text-widget-title: #a2c4de;
      --btn-primary: #2b6cb0;
      --btn-primary-hover: #1d4e89;
      --btn-primary-text: #ffffff;
      --btn-secondary: #334e68;
      --btn-secondary-hover: #243b53;
      --popup-btn: #5c6ac4;
      --popup-btn-text: #ffffff;
      --popup-btn-hover: #4955b5;
      --genre-tag-bg: #4c51bf;
      --link-accent: #ed64a6;
      --accent-gold: #ecc94b;
      --accent-blue: #4299e1;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.16);
      --font-title: 'Archivo Black', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-meta: 'Poppins', sans-serif;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 50px;
      --radius-circle: 50%;
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
      --transition-fast: 0.18s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-body);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }
    button, .btn-heart, .btn-watch { cursor: pointer; font-family: inherit; }

    /* ── HERO SLIDER ── */
    .hero-slider {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
    }
    .slides-container {
      display: flex;
      transition: transform 0.55s ease-in-out;
      height: 100%;
    }
    .slide {
      min-width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 0 5%;
    }
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        to right,
        rgba(10, 25, 41, 0.97) 28%,
        rgba(10, 25, 41, 0.35) 100%
      );
    }
    .slide::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 25%;
      background: linear-gradient(to top, var(--bg-body) 0%, transparent 100%);
    }
    .slide-content {
      position: relative;
      z-index: 2;
      max-width: 650px;
      width: 100%;
      margin-bottom: 15%;
    }
    .slide-title {
      font-family: var(--font-title);
      font-size: clamp(18px, 4.5vw, 38px);
      margin-bottom: 6px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .slide-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      align-items: center;
    }
    .meta-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: clamp(0.55rem, 1.4vw, 0.72rem);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .slide-synopsis {
      font-size: clamp(0.55rem, 1.4vw, 0.82rem);
      color: rgba(255,255,255,0.78);
      margin-bottom: 14px;
      line-height: 1.45;
      max-height: 60px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .slide-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn-watch {
      background: var(--btn-primary);
      color: #fff;
      padding: clamp(8px, 1.5vw, 12px) clamp(14px, 2.5vw, 26px);
      border-radius: var(--radius-pill);
      font-weight: 700;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all var(--transition-fast);
    }
    .btn-watch:hover {
      background: var(--btn-primary-hover);
      transform: scale(1.02);
    }
    .btn-heart-slide {
      width: clamp(32px, 5vw, 44px);
      height: clamp(32px, 5vw, 44px);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border-medium);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      color: #fff;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
    }
    .btn-heart-slide:hover {
      background: rgba(255,255,255,0.2);
    }
    .slider-nav {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 4px 16px;
      z-index: 5;
      border: 1px solid var(--border-subtle);
    }
    .slider-arrow {
      background: none;
      border: none;
      color: #fff;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .slider-arrow:hover {
      color: var(--btn-primary);
    }
    .slide-counter {
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      color: rgba(255,255,255,0.85);
    }
    .slider-dots {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 5;
    }
    .dot {
      width: clamp(5px, 0.8vw, 7px);
      height: clamp(5px, 0.8vw, 7px);
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      cursor: pointer;
    }
    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ── GRID & CARD ── */
    .card-title {
      font-size: 0.875rem; font-weight:600; color:#fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .card-meta-sm { font-size:0.75rem; font-weight:500; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-info-grid .card-title { font-size:0.85rem; }
    .card-info-grid .card-meta-sm { font-size:0.7rem; }
    .badge { font-size:0.625rem; font-weight:700; text-transform:uppercase; }
    .poster-status-badge { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,0.7); color:#fff; font-size:0.6rem; padding:2px 5px; border-radius:3px; z-index:2; }
    .poster-rating-badge { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.7); color:var(--accent-gold); font-size:0.6rem; padding:2px 5px; border-radius:3px; z-index:2; display:flex; align-items:center; gap:3px; }

    /* ── LAYOUT ── */
    .main-layout { display:flex; gap:0; max-width:100%; }
    .main-content { flex:1; min-width:0; padding:0 16px; }
    .sidebar-right { flex:0 0 340px; max-width:340px; padding:0 16px 0 8px; position:sticky; top:80px; align-self:flex-start; max-height:calc(100vh - 100px); overflow-y:auto; }
    .section { margin:30px 0; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .section-title { font-family:var(--font-title); font-size:1.35rem; color:var(--text-widget-title); }
    .section-controls { display:flex; align-items:center; gap:8px; }
    .view-all { font-size:0.75rem; font-weight:600; color:var(--link-accent); border:1px solid var(--link-accent); border-radius:var(--radius-pill); padding:5px 12px; white-space:nowrap; transition:all var(--transition-fast); }
    .view-all:hover { background:rgba(237,100,166,0.15); }
    .scroll-arrow { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.06); border:1px solid var(--border-medium); display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; font-size:1rem; }
    .scroll-arrow:hover { background:rgba(255,255,255,0.14); }
    @media (max-width:1024px) { .scroll-arrow { display:none; } }

    .horizontal-scroll { display:flex; gap:14px; overflow-x:auto; scroll-behavior:smooth; padding-bottom:8px; }
    .horizontal-scroll::-webkit-scrollbar { display:none; }
    .show-card-horiz { flex:0 0 auto; width:165px; cursor:pointer; transition:transform var(--transition-fast); }
    .show-card-horiz:hover { transform:translateY(-4px); }
    .card-poster { width:100%; aspect-ratio:3/4.5; background-size:cover; background-position:center; border-radius:var(--radius-md); position:relative; overflow:hidden; margin-bottom:6px; background-color:var(--bg-card); }
    .play-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition-fast); border-radius:var(--radius-md); }
    .play-overlay svg { width:36px; height:36px; fill:#fff; }
    .show-card-horiz:hover .play-overlay, .show-card-grid:hover .play-overlay { opacity:1; }
    .ranking-badge { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); color:#fff; font-weight:700; font-size:0.7rem; padding:2px 7px; border-radius:4px; z-index:2; }
    .quality-badge { position:absolute; top:6px; left:6px; background:rgba(0,0,0,0.7); color:#fff; font-size:0.62rem; padding:2px 5px; border-radius:3px; z-index:2; font-weight:600; }
    .score-badge { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.7); color:var(--accent-gold); font-size:0.65rem; padding:2px 5px; border-radius:3px; z-index:2; font-weight:600; display:flex; align-items:center; gap:3px; }

    /* NEW ON ANIOCEAN SECTION */
    .new-aniocean-grid { 
      display:grid; 
      grid-template-columns:repeat(7, 1fr); 
      gap:12px; 
    }
    @media (max-width: 1400px) {
      .new-aniocean-grid { grid-template-columns:repeat(6, 1fr); }
    }
    @media (max-width: 1200px) {
      .new-aniocean-grid { grid-template-columns:repeat(5, 1fr); }
    }
    @media (max-width: 992px) {
      .new-aniocean-grid { grid-template-columns:repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .new-aniocean-grid { grid-template-columns:repeat(3, 1fr); gap:10px; }
    }
    @media (max-width: 480px) {
      .new-aniocean-grid { grid-template-columns:repeat(2, 1fr); }
    }
    
    .aniocean-card {
      position: relative;
      cursor: pointer;
      transition: transform var(--transition-fast);
    }
    .aniocean-card:hover {
      transform: translateY(-4px);
    }
    .aniocean-poster {
      position: relative;
      aspect-ratio: 3/4.5;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
    }
    .aniocean-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .aniocean-badge-score {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.8);
      color: var(--accent-gold);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 3px;
      z-index: 2;
    }
    .aniocean-badge-lang {
      position: absolute;
      bottom: 6px;
      left: 6px;
      display: flex;
      gap: 4px;
      z-index: 2;
    }
    .aniocean-lang-badge {
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .aniocean-lang-badge i {
      font-size: 0.7rem;
    }
    .aniocean-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px 6px 6px;
      background: linear-gradient(to top, rgba(10,25,41,0.95) 0%, rgba(10,25,41,0.7) 40%, transparent 100%);
      text-align: center;
      pointer-events: none;
    }
    .aniocean-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-bottom: 2px;
      font-weight: 500;
    }
    .aniocean-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .grid-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(185px,1fr)); gap:16px; }
    @media (min-width:768px){ .grid-container{ grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); } }
    .show-card-grid { border-radius:var(--radius-md); overflow:hidden; cursor:pointer; transition:transform var(--transition-fast); position:relative; }
    .show-card-grid:hover { transform:translateY(-3px); }
    .show-card-grid .card-poster {
      aspect-ratio: 3/4.5;
      border-radius: 0;
      margin-bottom: 0;
    }
    .card-info-grid {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 8px 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      color: #fff;
      pointer-events: none;
    }

    .toggle-tabs { display:flex; gap:4px; }
    .toggle-tab { padding:5px 12px; border-radius:var(--radius-pill); background:rgba(255,255,255,0.04); border:1px solid var(--border-medium); font-size:0.72rem; cursor:pointer; transition:all var(--transition-fast); color:var(--text-secondary); font-weight:500; }
    .toggle-tab.active { background:var(--popup-btn); color:#fff; border-color:var(--popup-btn); font-weight:600; }

    /* sidebar */
    .sidebar-list-item { display:flex; gap:10px; align-items:center; padding:8px; border-radius:var(--radius-sm); cursor:pointer; transition:background var(--transition-fast); margin-bottom:4px; }
    .sidebar-list-item:hover { background:var(--bg-surface); }
    .sidebar-rank { font-size:1.4rem; font-weight:700; color:rgba(255,255,255,0.12); width:30px; text-align:center; flex-shrink:0; font-family:var(--font-title); }
    .sidebar-poster { width:50px; height:70px; object-fit:cover; border-radius:var(--radius-sm); flex-shrink:0; background:var(--bg-card); }
    .sidebar-info h4 { 
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
      line-height: 1.3;
    }
    .side-meta { font-size:0.6875rem; color:var(--text-muted); margin-top:2px; }

    /* ── POPULAR ANIME LIST (Miruro-style) ── */
    /* ── SKELETON WAVE ANIMATION ── */
    @keyframes skeletonWave {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.10) 37%,
        rgba(255,255,255,0.04) 63%);
      background-size: 800px 100%;
      animation: skeletonWave 1.4s ease infinite;
      border-radius: 6px;
    }
    /* Skeleton placeholders for cards */
    .skeleton-card {
      background:var(--bg-card,#0f1923);
      border-radius:10px; overflow:hidden;
      flex-shrink:0;
    }
    .skeleton-card .sk-poster  { width:100%; aspect-ratio:2/3; }
    .skeleton-card .sk-line    { height:10px; margin:8px 8px 4px; border-radius:4px; }
    .skeleton-card .sk-line.w60{ width:60%; }
    .skeleton-card .sk-line.w80{ width:80%; }
    /* Skeleton for PA rows */
    .sk-pa-row {
      display:flex; align-items:center; gap:12px;
      background:var(--bg-card,#0f1923);
      border-radius:10px; padding:10px 14px;
      min-height:88px; overflow:hidden;
    }
    .sk-pa-rank { width:28px; height:20px; flex-shrink:0; border-radius:4px; }
    .sk-pa-img  { width:56px; height:78px; border-radius:6px; flex-shrink:0; }
    .sk-pa-body { flex:1; display:flex; flex-direction:column; gap:7px; }
    .sk-pa-title{ height:13px; width:70%; border-radius:4px; }
    .sk-pa-meta { display:flex; gap:5px; flex-wrap:wrap; }
    .sk-pa-tag  { height:18px; border-radius:20px; }
    /* Skeleton for sidebar rows */
    .sk-side-row {
      display:flex; align-items:center; gap:10px;
      padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .sk-side-rank { width:20px; height:16px; border-radius:3px; flex-shrink:0; }
    .sk-side-img  { width:38px; height:54px; border-radius:5px; flex-shrink:0; }
    .sk-side-body { flex:1; display:flex; flex-direction:column; gap:6px; }
    .sk-side-t    { height:11px; width:80%; border-radius:3px; }
    .sk-side-m    { height:9px; width:50%; border-radius:3px; }
    /* Skeleton for hero */
    .sk-hero { width:100%; aspect-ratio:16/7; border-radius:12px; min-height:200px; }
    /* Skeleton for schedule */
    .sk-sched-row {
      display:flex; align-items:center; gap:10px; padding:9px 0;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .sk-sched-img  { width:44px; height:60px; border-radius:6px; flex-shrink:0; }
    .sk-sched-body { flex:1; display:flex; flex-direction:column; gap:6px; }
    .sk-sched-t    { height:11px; width:75%; border-radius:3px; }
    .sk-sched-m    { height:9px; width:45%; border-radius:3px; }

    /* ── POPULAR ANIME LIST (Miruro-style improved) ── */
    .pa-list { display:flex; flex-direction:column; gap:5px; }
    .pa-row {
      display:flex; align-items:center; gap:0;
      position:relative; overflow:hidden;
      border-radius:10px;
      cursor:pointer; text-decoration:none; color:#fff;
      min-height:88px;
      transition:transform .2s ease, box-shadow .2s ease;
      background-color: var(--bg-card, #0f1923);
    }
    /* RIGHT SIDE: actual bg image — visible on right, fades left */
    .pa-row::before {
      content:''; position:absolute; inset:0;
      background-image:var(--pa-bg);
      background-size:cover; background-position:center 20%;
      filter:blur(1.5px) brightness(0.35) saturate(1.4);
      transition:filter .3s ease;
      z-index:0;
    }
    /* LEFT SIDE: dark overlay that fades to transparent right — Miruro look */
    .pa-row::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to right,
        var(--bg-card,#0f1923) 0%,
        var(--bg-card,#0f1923) 38%,
        rgba(10,18,28,0.72) 62%,
        rgba(10,18,28,0.0) 100%);
      z-index:1;
      transition:opacity .3s ease;
    }
    .pa-row:hover::before { filter:blur(1px) brightness(0.48) saturate(1.6); }
    .pa-row:hover::after  { opacity:0.82; }
    .pa-row:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.6); }
    /* Rank number */
    .pa-rank {
      position:relative; z-index:2;
      width:38px; flex-shrink:0; text-align:center;
      font-size:1rem; font-weight:800; opacity:.2;
      font-family:var(--font-title); padding-left:6px;

  <script>
    (function() {
      /* ── Universal proxy — single CF Worker for all API traffic ── */
      const ANIUMI_PROXY  = 'https://aniumi.bionmovies47.workers.dev';
      /* Direct fallback URLs (used if proxy is unavailable) */
      const JIKAN_BASE    = 'https://api.jikan.moe/v4';
      const TMDB_LEGACY   = 'https://aniocen.bionmovies47.workers.dev'; // working TMDB proxy
      const ANIKOTO_API   = 'https://anikoto.bionmovies47.workers.dev'; // direct anikoto fallback
      const TMDB_IMAGE = 'https://image.tmdb.org/t/p';
      const tmdbImg = (p,s='w500') => p ? `${TMDB_IMAGE}/${s}${p}` : '';
      const tmdbBack = (p) => p ? `${TMDB_IMAGE}/w1280${p}` : '';

      function infoUrl(show) {
        const id = show.id;
        const title = (show.title || '').trim();
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

        let type = 'anime';
        let prefixId = id;

        if (id.startsWith('jikan-')) {
          type = 'anime';
          prefixId = id.replace(/^jikan-(?:air-|up-|comp-|tr-|pop-)?/, 'jikan-');
        } else if (id.startsWith('tmdb-mv-') || id.startsWith('tmdb-movie-') || id.startsWith('tmdb-up-')) {
          type = 'movie';
          const numeric = id.replace(/^tmdb-(?:mv|movie|up)-/, '');
          prefixId = `tmdb-movie-${numeric}`;
        } else if (id.startsWith('tmdb-tv-') || id.startsWith('tmdb-tvpop-') || (id.startsWith('tmdb-comp-') && !id.includes('movie'))) {
          type = 'tv';
          const numeric = id.replace(/^tmdb-(?:tv|tvpop|comp)-/, '');
          prefixId = `tmdb-tv-${numeric}`;
        } else if (/^\d+$/.test(id)) {
          type = 'anime';
          prefixId = `jikan-${id}`;
        }

        const base = `/info/${type}/${prefixId}`;
        return slug ? `${base}/${slug}` : base;
      }

      const GENRE_MAP = {
        28:'Action',12:'Adventure',16:'Animation',35:'Comedy',80:'Crime',99:'Documentary',
        18:'Drama',10751:'Family',14:'Fantasy',36:'History',27:'Horror',10402:'Music',
        9648:'Mystery',10749:'Romance',878:'Science Fiction',10770:'TV Movie',53:'Thriller',
        10752:'War',37:'Western',10759:'Action & Adventure',10762:'Kids',10763:'News',
        10764:'Reality',10765:'Sci-Fi & Fantasy',10766:'Soap',10767:'Talk',10768:'War & Politics'
      };

      const RATING_EXPLAIN = {
        'g':'All Ages','pg':'Children','pg_13':'Teens 13+','r':'17+ (violence & profanity)',
        'r+':'Mild Nudity','rx':'Hentai','none':'Unrated'
      };

      async function fetchAnikoto(endpoint) {
        // 1) Try universal proxy (cached, CORS-safe)
        try {
          const proxyPath = endpoint.startsWith('/') ? endpoint : `/${endpoint}`;
          const res = await fetch(`${ANIUMI_PROXY}/anikoto${proxyPath}`, {
            headers: { Accept: 'application/json' },
            signal: AbortSignal.timeout(8000)
          });
          if (res.ok) {
            const json = await res.json();
            return { ok: true, data: json.data || json };
          }
        } catch(e) { /* proxy down — fall through */ }
        // 2) Direct Anikoto fallback
        try {
          const res = await fetch(`${ANIKOTO_API}${endpoint}`, {
            headers: { Accept: 'application/json' }
          });

          if (res.ok) return await res.json();
          if (res.status === 429) {
            // Proxy also rate-limited — wait and retry once via proxy
            await new Promise(r => setTimeout(r, 2000));
            try {
              const r2 = await fetch(`${ANIUMI_PROXY}/jikan/${endpoint}${qs}`, {

              });

            } catch(e) {}
          }
        } catch(e) { /* proxy down — fall through to direct */ }
        // 2) Direct Jikan with retry (safety net — longer backoff to respect rate limits)
        const directUrl = `${JIKAN_BASE}/${endpoint}${qs}`;
        for (let attempt = 1; attempt <= retries; attempt++) {
          try {
            const res = await fetch(directUrl, { signal: AbortSignal.timeout(12000) });
            if (res.ok) return await res.json();
            if (res.status === 429) {

        }

      // Apply correct backdrop resolution based on screen width
      function applyResponsiveBackdrops() {
        const isDesktop = window.innerWidth >= 768;
        const isLargeDesktop = window.innerWidth >= 1440;
        document.querySelectorAll('#slidesContainer .slide').forEach(el => {
          const url = isLargeDesktop
            ? (el.dataset.bgOrig || el.dataset.bgDesktop)
            : isDesktop
              ? el.dataset.bgDesktop
              : el.dataset.bgMobile;
          if (url) el.style.backgroundImage = `url('${url}')`;
        });
      }
      window.addEventListener('resize', applyResponsiveBackdrops);

      function goToSlide(i) { currentSlide = ((i%heroData.length)+heroData.length)%heroData.length; updateSlidePos(); }
      function updateSlidePos() {
        document.getElementById('slidesContainer').style.transform = `translateX(-${currentSlide*100}%)`;
        // Dots are capped at 30 — highlight the proportionally closest dot
        const dots = document.querySelectorAll('#sliderDots .dot');
        const total = heroData.length;
        dots.forEach((d,idx) => {
          // Map dot index to slide range — each dot represents total/dots.length slides
          const ratio = total / dots.length;
          const active = Math.round(currentSlide / ratio) === idx;
          d.classList.toggle('active', active);
        });
        document.getElementById('slideCounter').textContent = `${currentSlide+1} / ${heroData.length}`;
      }
      document.getElementById('prevSlide').addEventListener('click', ()=>goToSlide(currentSlide-1));

      let _completedPagesCache = {};
      async function loadCompleted(page=1) {
        if (window.AniCache && !_completedPagesCache[page]) {
          const cached = await window.AniCache.get('index:recently_completed').catch(()=>null);
          if (cached && cached.pages) _completedPagesCache = { ..._completedPagesCache, ...cached.pages };
        }
        if (_completedPagesCache[page] && _completedPagesCache[page].length) {
          const el = document.getElementById('completedGrid');

        completedCurrentPage = page;

        const [tv, anime, anime2] = await Promise.all([
          fetchTMDB('/discover/tv', `with_status=3&air_date.lte=${today}&sort_by=first_air_date.desc&page=${page}`),
          fetchJikan('anime', `status=complete&order_by=start_date&sort=desc&page=${page}&limit=25`),
          fetchJikan('anime', `status=complete&order_by=start_date&sort=desc&page=${page+1}&limit=25`)
        ]);
        // Deduplicate Jikan results by mal_id
        const allAnime = [...(anime.data||[]), ...(anime2.data||[])];
        const uniqueAnime = [];
        const seenThisPage = new Set();
        for (const a of allAnime) {
          const key = String(a.mal_id);
          if (!seenThisPage.has(key)) { seenThisPage.add(key); uniqueAnime.push(a); }
        }

      function renderPagination(page) {

        const start = Math.max(1, page-2);

        for (let i=start; i<=end; i++) {
          html += `<button class="${i===page?'active':''}" data-page="${i}">${i}</button>`;
        }
        html += `</div><button ${page>=total?'disabled':''} id="compNext">Next</button>`;

      // ---------- Helper: fetch 3 pages for one day, with delays ----------
      async function fetchDaySchedules(day) {

      // ---------- Episode number calculation (unchanged) ----------
      function getEpisodeNumber(anime) {
        if (anime.status === 'Finished Airing') return anime.episodes || '?';
        const broadcast = anime.broadcast;
        if (!broadcast || !broadcast.time) return '?';
        const timeMatch = broadcast.time.match(/(\d{1,2}):(\d{2})/);
        if (!timeMatch) return '?';
        const [_, hour, minute] = timeMatch;
        const broadcastHour = parseInt(hour);
        const broadcastMinute = parseInt(minute);
        const firstAir = anime.aired?.from ? new Date(anime.aired.from) : null;
        if (!firstAir) return '?';
        const now = new Date();
        const currentDate = new Date(now);
        currentDate.setHours(broadcastHour, broadcastMinute, 0, 0);
        const diffMs = currentDate - firstAir;
        const weeksPassed = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000));
        let episode = weeksPassed + 1;
        if (anime.episodes && episode > anime.episodes) episode = anime.episodes;
        return episode;
      }

      // ---------- Render schedule for a given day (from scheduleData) ----------
      function renderScheduleForDay(dayName) {
  const container = document.getElementById('eswBody');
  const animeList = scheduleData?.[dayName] || [];
  if (!animeList.length) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">No episodes scheduled</div>';
    return;
  }

  // Sort by broadcast time
  const sorted = [...animeList].sort((a, b) => {
    const timeA = a.broadcast?.time || '';
    const timeB = b.broadcast?.time || '';
    return timeA.localeCompare(timeB);
  });

  // Build rows
  const rowsHtml = sorted.map(anime => {
    const episode = getEpisodeNumber(anime);
    const title = anime.title_english || anime.title;
    const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const watchUrl = `/info/anime/jikan-${anime.mal_id}/${slug}`;
    const poster = anime.images?.jpg?.image_url || '';
    const broadcastTime = anime.broadcast?.time || 'TBA';

    return `
      <a href="${watchUrl}" class="schedule-row">
        <div class="schedule-time">${broadcastTime}</div>
        <div class="schedule-poster"><img src="${poster}" loading="lazy" onerror="this.style.display='none'"></div>
        <div class="schedule-title">${escapeHtml(title)}</div>
        <div class="schedule-ep">EP ${episode}</div>
      </a>
    `;
  }).join('');

  // Split rows into visible and hidden
  const visibleCount = 7;
  const rowsArray = rowsHtml.split('</a>').filter(r => r.trim());
  const visibleRows = rowsArray.slice(0, visibleCount).join('</a>') + (rowsArray.length > visibleCount ? '</a>' : '');
  const hiddenRows = rowsArray.slice(visibleCount).join('</a>');
  const hasMore = rowsArray.length > visibleCount;

  container.innerHTML = `
    <div class="schedule-list">
      ${visibleRows}
      ${hasMore ? `<div class="schedule-more-wrapper" style="display:none;">${hiddenRows}</div>` : ''}
      ${hasMore ? `<button type="button" class="schedule-more-btn">Show More (${rowsArray.length - visibleCount})</button>` : ''}
    </div>
  `;

  // Attach click handler with prevention of default action and propagation
  const moreBtn = container.querySelector('.schedule-more-btn');
  if (moreBtn) {
    moreBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();

      const wrapper = container.querySelector('.schedule-more-wrapper');
      if (wrapper) {
        const isHidden = wrapper.style.display === 'none';
        wrapper.style.display = isHidden ? 'block' : 'none';
        moreBtn.textContent = isHidden ? 'Show Less' : `Show More (${rowsArray.length - visibleCount})`;
      }
    });
  }
}
        

      // ---------- Build week dates (Mon‑Sun) ----------
      function buildWeekDates() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const currentDayOfWeek = today.getDay(); // 0 = Sunday
        let monday = new Date(today);
        const diffToMonday = (currentDayOfWeek === 0 ? -6 : 1 - currentDayOfWeek);
        monday.setDate(today.getDate() + diffToMonday + currentWeekOffset * 7);
        const weekDates = [];
        for (let i = 0; i < 7; i++) {
          const date = new Date(monday);
          date.setDate(monday.getDate() + i);
          weekDates.push(date);
        }
        return weekDates;
      }

      // ---------- Update day cards ----------
      function updateDaySelector() {
        const weekDates = buildWeekDates();
        const today = new Date();
        const todayStr = today.toDateString();
        const container = document.getElementById('eswDaysScroll');
        container.innerHTML = weekDates.map((date, idx) => {
          const isToday = date.toDateString() === todayStr;
          const dayName = DAY_NAMES[date.getDay() === 0 ? 6 : date.getDay() - 1];
          const isActive = currentDay === DAYS[date.getDay() === 0 ? 6 : date.getDay() - 1];
          return `
            <div class="esw-day-card ${isToday ? 'today' : ''} ${isActive ? 'active' : ''}" data-day-index="${idx}">
              <div class="esw-dc-date">${date.getDate()}</div>
              <small>${dayName}</small>
            </div>
          `;
        }).join('');
        document.querySelectorAll('#eswDaysScroll .esw-day-card').forEach(card => {
          card.addEventListener('click', (e) => {
            const idx = parseInt(card.dataset.dayIndex);
            const selectedDate = weekDates[idx];
            const dayKey = DAYS[selectedDate.getDay() === 0 ? 6 : selectedDate.getDay() - 1];
            setCurrentDay(dayKey);
          });
        });
      }

      // ---------- Set current day, render ----------
      function setCurrentDay(dayKey) {
        currentDay = dayKey;
        updateDaySelector();
        renderScheduleForDay(currentDay);
      }

      // ---------- Main loader (sequential fetch, localStorage) ----------
      async function loadSchedule() {
        if (window.AniCache) {
          const cached = await window.AniCache.get('index:schedule');
          if (cached) {
            window._scheduleData = cached;
            const activeDay = document.querySelector('.schedule-tab.active')?.dataset.day || 'monday';
            renderScheduleForDay(activeDay);
            return;
          }
        }
        const STORAGE_KEY = 'aniocean_schedule_cache';
        const CACHE_TTL = 6 * 60 * 60 * 1000; // 6h localStorage TTL (matches DB)
        const cached = localStorage.getItem(STORAGE_KEY);
        let needFetch = true;

        // Show a loading indicator immediately so the user never sees
        // "No episodes scheduled" while we're still fetching.
        const loadingHtml = '<div style="text-align:center;padding:30px 10px;color:var(--text-muted);font-size:0.85rem;">'
          + '<div style="display:inline-block;width:24px;height:24px;border:2px solid rgba(255,255,255,.15);'
          + 'border-top-color:var(--btn-primary,#3b82f6);border-radius:50%;'
          + 'animation:schedSpin .8s linear infinite;margin-bottom:10px;"></div>'
          + '<div>Loading schedule…</div></div>';
        // Try to show loading state in the current day's container.
        const body0 = document.getElementById('eswBody');
        if (body0) body0.innerHTML = loadingHtml;

        if (cached) {
          try {
            const { data, timestamp } = JSON.parse(cached);
            // BUGFIX (v2): the previous code cached ANY result, including
            // empty arrays produced by Jikan rate-limit failures.  That
            // meant one bad fetch could leave the schedule blank for
            // 24 hours.  Now we ONLY trust a cache entry that has at
            // least one day with data — otherwise we refetch.
            const hasAnyData = data && Object.values(data).some(arr => Array.isArray(arr) && arr.length > 0);
            if (Date.now() - timestamp < CACHE_TTL && hasAnyData) {
              scheduleData = data;
              needFetch = false;
              console.log('Schedule loaded from localStorage');
            } else if (!hasAnyData) {
              console.warn('Cached schedule was empty — refetching (ignoring stale cache).');
            }
          } catch(e) { console.warn('Cache parse error', e); }
        }

        if (needFetch) {
          console.log('Fetching schedule one day at a time...');
          scheduleData = {};
          let fetchedAny = false;
          for (const day of DAYS) {
            scheduleData[day] = await fetchDaySchedules(day);
            if (scheduleData[day].length > 0) fetchedAny = true;
            await new Promise(r => setTimeout(r, 500)); // delay between days
          }
          // BUGFIX (v2): only persist the cache if we actually got data.
          // Otherwise a transient Jikan outage would poison the cache
          // for 24 hours and the user would see "No episodes scheduled"
          // even after Jikan recovers.
          if (fetchedAny) {
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify({
                data: scheduleData,
                timestamp: Date.now()
              }));
              console.log('Schedule cached for 24 hours');
            } catch(e) { console.warn('Could not write schedule cache:', e); }
          } else {
            console.warn('Schedule fetch returned no data — NOT caching (will retry next page load).');
          }
        }

        // Expose scheduleData globally for debugging
        window.scheduleData = scheduleData;
        if (window.AniCache && scheduleData) {
          for (const [, list] of Object.entries(scheduleData)) {
            if (list?.length) await window.AniCache.saveSchedule(list);
          }
          await window.AniCache.stampSection('schedule');
        }

        // Determine current day (Monday‑Sunday)
        const now = new Date();
        let dayIndex = now.getDay(); // 0 = Sunday
        if (dayIndex === 0) dayIndex = 7;
        const currentDayKey = DAYS[dayIndex - 1];
        setCurrentDay(currentDayKey);
        updateClock();
        setInterval(updateClock, 1000);
      }

      // Week navigation
      function previousWeek() {
        currentWeekOffset--;
        updateDaySelector();
        setCurrentDay(currentDay);
      }
      function nextWeek() {
        currentWeekOffset++;
        updateDaySelector();
        setCurrentDay(currentDay);
      }

      function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', {
    hour12: true,          // 12‑hour AM/PM format
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    timeZoneName: 'short'
  });
  document.getElementById('eswClockText').textContent = timeStr;
}
      document.getElementById('eswPrev').addEventListener('click', previousWeek);
      document.getElementById('eswNext').addEventListener('click', nextWeek);

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }
      

      // ── COMPLETION TRACKER ─────────────────────────────────────────────────
      // Tracks which sections have been fully fetched and saved to DB this session.
      // On slow/disrupted networks a section may load partially — the retry loop
      // keeps calling the loader until every section is confirmed stored in DB.
      const _SECTION_KEYS = [
        'index:hero_slider', 'index:top_airing', 'index:new_releases',
        'index:new_on_aniumi', 'index:upcoming', 'index:recently_completed',
        'index:trending_now', 'index:most_popular', 'index:popular_anime',
        'index:schedule',
      ];
      const _sectionLoaders = {
        'index:hero_slider':         () => loadHero(),
        'index:top_airing':          () => loadTopAiring(),
        'index:new_releases':        () => loadNewReleases(),
        'index:new_on_aniumi':       () => loadNewAniocean(),
        'index:upcoming':            () => loadUpcoming(),
        'index:recently_completed':  () => loadCompleted(1),
        'index:trending_now':        () => loadTrending('today'),
        'index:most_popular':        () => loadPopular(),
        'index:popular_anime':       () => loadPopularAnime(),
        'index:schedule':            () => loadSchedule(),
      };

      // Check DB for a cache entry (non-null, non-empty)
      async function _isCachedInDB(key) {
        if (!window.AniCache) return false;
        try {
          const v = await window.AniCache.get(key);
          if (!v) return false;
          if (Array.isArray(v)) return v.length > 0;
          if (typeof v === 'object') return Object.keys(v).length > 0;
          return !!v;
        } catch(e) { return false; }
      }

      // Run after all sections have had a chance to load.
      // Checks DB for each section — any missing ones get retried.
      // Repeats up to 4 times with increasing delays (10s, 30s, 60s, 120s).
      async function ensureHomepageComplete() {
        const delays = [10000, 30000, 60000, 120000];
        for (const delay of delays) {
          await new Promise(r => setTimeout(r, delay));
          if (!window.AniCache) continue;
          const missing = [];
          for (const key of _SECTION_KEYS) {
            const ok = await _isCachedInDB(key);
            if (!ok) missing.push(key);
          }
          if (missing.length === 0) {
            console.log('[Cache] ✅ All homepage sections fully cached in DB');
            break;
          }
          console.log(`[Cache] ⚠ Missing sections: ${missing.join(', ')} — retrying...`);
          for (const key of missing) {
            try { await _sectionLoaders[key](); } catch(e) { /* ignore — will retry */ }
            await new Promise(r => setTimeout(r, 800)); // stagger retries
          }
        }
      }

      function init() {
        injectSkeletons();
        loadHero();
        loadTopAiring();
        loadNewReleases();
        loadNewAniocean();
        loadUpcoming();
        loadCompleted(1);
        loadTrending('today');
        loadPopular();
        loadPopularAnime();
        loadSchedule();
        // After initial loads settle, verify everything is in DB and retry any gaps
        setTimeout(ensureHomepageComplete, 5000);
      }
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
